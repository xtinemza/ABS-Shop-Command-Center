*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0B0D;font-family:'Barlow',sans-serif;color:#AAA}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

select,input,textarea{background:#111113;border:1px solid #222;border-radius:3px;color:#CCC;padding:10px 12px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;width:100%;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:#D4A017}
select option{background:#111113}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;font-family:'Barlow',sans-serif}

/* ── SMALL UI PIECES ── */
function Label({children}){
  return html`<div style=${{fontSize:10,fontWeight:700,color:'#555',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>${children}</div>`;
}
function Field({label,children}){
  return html`<div style=${{marginBottom:16}}><${Label}>${label}</${Label}>${children}</div>`;
}
function GenBtn({loading}){
  return html`<button type="submit" style=${{marginTop:20,padding:'14px 0',borderRadius:3,border:`1px solid ${G}66`,background:loading?'#333':`linear-gradient(135deg,${G},${G}CC)`,color:loading?'#888':'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.12em',textTransform:'uppercase',fontStyle:'italic',width:'100%'}}>${loading?'Generating...':'Generate →'}</button>`;
}
function TabBar({tabs,active,onChange}){
  return html`<div style=${{display:'flex',gap:8,marginBottom:20}}>
    ${tabs.map(t=>html`<button key=${t.id} type="button" onClick=${()=>onChange(t.id)} style=${{flex:1,padding:'8px 0',borderRadius:3,border:`1px solid ${active===t.id?G:'#222'}`,background:active===t.id?`${G}15`:'transparent',color:active===t.id?G:'#555',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>${t.label}</button>`)}
  </div>`;
}

function ServiceHistoryForm({onSubmit,loading}){
  const EMPTY_ROW=()=>({date:'',mileage:'',service:'',tech:'',cost:'',notes:''});
  const[meta,sMeta]=useState({customer:'',vehicle:'',vin:'',mileage:''});
  const[rows,sRows]=useState([EMPTY_ROW()]);

  const setMeta=(k,v)=>sMeta(p=>({...p,[k]:v}));
  const setRow=(i,k,v)=>sRows(r=>r.map((row,idx)=>idx===i?{...row,[k]:v}:row));
  const addRow=()=>sRows(r=>[...r,EMPTY_ROW()]);
  const removeRow=(i)=>sRows(r=>r.filter((_,idx)=>idx!==i));

  const handleSubmit=(e)=>{
    e.preventDefault();
    const records=JSON.stringify(rows.filter(r=>r.date||r.service));

      <div><${Label}>VIN (optional)</${Label}><input style=${iStyle} value=${meta.vin} onChange=${e=>setMeta('vin',e.target.value)}/></div>
    </div>

    <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
      <div style=${{width:3,height:14,background:G,borderRadius:1}}/>
      <span style=${{fontSize:9,fontWeight:800,color:'#555',letterSpacing:'0.14em'}}>SERVICE RECORDS</span>

/* ── OUTPUT PANEL ── */
function CopyBtn({label,text,dim}){
  const[ok,sOk]=useState(false);
  const click=()=>{navigator.clipboard.writeText(text).catch(()=>{});sOk(true);setTimeout(()=>sOk(false),1500)};
  return html`<button onClick=${click} style=${{padding:'6px 14px',borderRadius:3,border:`1px solid ${dim?'#222':G+'66'}`,background:dim?'#111':`${G}15`,color:dim?'#555':G,fontSize:10,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase'}}>${ok?'✓ Copied':label}</button>`;
}
function DlBtn({text,filename}){
  const click=()=>{const b=new Blob([text],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=filename||'output.txt';a.click();URL.revokeObjectURL(u)};
  return html`<button onClick=${click} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:10,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase'}}>↓ Download</button>`;
}

function FileTypeLabel({name}){
  const n=name.toLowerCase();
  if(n.includes('sms'))return html`<span style=${{fontSize:9,padding:'2px 7px',borderRadius:2,background:'#1A2A1A',border:'1px solid #2A4A2A',color:'#4ADE80',fontWeight:800,letterSpacing:'0.08em'}}>SMS</span>`;
  if(n.includes('email'))return html`<span style=${{fontSize:9,padding:'2px 7px',borderRadius:2,background:'#1A1A2A',border:'1px solid #2A2A5A',color:'#60A5FA',fontWeight:800,letterSpacing:'0.08em'}}>EMAIL</span>`;
  if(n.includes('phone')||n.includes('script'))return html`<span style=${{fontSize:9,padding:'2px 7px',borderRadius:2,background:'#2A1A1A',border:'1px solid #5A2A1A',color:'#F97316',fontWeight:800,letterSpacing:'0.08em'}}>PHONE</span>`;
  return html`<span style=${{fontSize:9,padding:'2px 7px',borderRadius:2,background:'#1A1A1A',border:'1px solid #2A2A2A',color:'#888',fontWeight:800,letterSpacing:'0.08em'}}>TXT</span>`;

function OutputPanel({output,loading,error,content}){
  const[activeFile,sActiveFile]=useState(null);
  const[showSummary,sShowSummary]=useState(false);

  const fileEntries=content?Object.entries(content):[];

  // Auto-select first file when content arrives
  useEffect(()=>{
    if(fileEntries.length>0&&!activeFile)sActiveFile(fileEntries[0][0]);
  },[content]);

  if(loading) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
    <div style=${{display:'flex',gap:8}}>
      ${[0,1,2].map(i=>html`<div key=${i} style=${{width:10,height:10,borderRadius:'50%',background:G,animation:`pulse 1.2s ease ${i*0.2}s infinite`}}/>`)}
    </div>
    <div style=${{fontSize:12,color:'#555',fontWeight:700,letterSpacing:'0.1em'}}>GENERATING...</div>
  </div>`;

  if(error) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
    <div style=${{background:'#1A0A0A',border:'1px solid #5A1A1A',borderRadius:4,padding:'20px 24px',maxWidth:400}}>
      <div style=${{fontSize:10,fontWeight:800,color:'#E05',letterSpacing:'0.1em',marginBottom:8}}>ERROR</div>
      <div style=${{fontSize:13,color:'#AAA',lineHeight:1.6}}>${error}</div>
      <div style=${{fontSize:11,color:'#555',marginTop:12}}>The server may be waking up — please wait a moment and try again.</div>
    </div>
  </div>`;

  if(fileEntries.length===0&&!output) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
    <div style=${{fontSize:32,opacity:.3}}>⚡</div>
    <div style=${{fontSize:11,color:'#333',fontWeight:700,letterSpacing:'0.1em',textAlign:'center'}}>FILL IN THE FORM AND CLICK GENERATE</div>
  </div>`;

  // ── Rich file preview mode ──
  if(fileEntries.length>0){
    const allText=fileEntries.map(([k,v])=>v).join('\n\n'+'─'.repeat(40)+'\n\n');
    const activeContent=content[activeFile]||'';
    const shortName=n=>n.replace(/^.*[\\/]/,'').replace(/\.txt$/,'').replace(/_/g,' ').toUpperCase();

    return html`<div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

      <!-- Top action bar -->
      <div style=${{padding:'12px 20px',borderBottom:'1px solid #1A1A1E',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',background:'#0D0D0F'}}>
        <span style=${{fontSize:11,color:G,fontWeight:700,marginRight:4}}>✓ ${fileEntries.length} file${fileEntries.length>1?'s':''} generated</span>
        <${CopyBtn} label="Copy All" text=${allText}/>
        <${DlBtn} text=${allText} filename="all_output.txt"/>
        ${output&&html`<button onClick=${()=>sShowSummary(s=>!s)} style=${{padding:'6px 12px',borderRadius:3,border:'1px solid #222',background:'transparent',color:'#444',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:"'Barlow',sans-serif",letterSpacing:'0.08em'}}>${showSummary?'▲ HIDE':'▼ SUMMARY'}</button>`}
      </div>

      <!-- Collapsible summary -->
      ${showSummary&&output&&html`<div style=${{padding:'12px 20px',borderBottom:'1px solid #151518',background:'#0A0A0C'}}>
        <pre style=${{fontSize:11,color:'#555',lineHeight:1.6,whiteSpace:'pre-wrap',margin:0}}>${output}</pre>
      </div>`}

      <!-- File tabs -->
      <div style=${{display:'flex',overflowX:'auto',borderBottom:'1px solid #1A1A1E',background:'#0D0D0F',flexShrink:0}}>
        ${fileEntries.map(([fname])=>html`<button key=${fname} onClick=${()=>sActiveFile(fname)}
          style=${{padding:'10px 16px',border:'none',borderBottom:activeFile===fname?`2px solid ${G}`:'2px solid transparent',
          marginBottom:-1,background:'transparent',color:activeFile===fname?G:'#555',fontSize:10,fontWeight:800,
          letterSpacing:'0.07em',cursor:'pointer',fontFamily:"'Barlow',sans-serif",whiteSpace:'nowrap',flexShrink:0}}>
          ${shortName(fname)}
        </button>`)}
      </div>

      <!-- Active file preview -->
      <div style=${{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        ${activeFile&&html`<div style=${{padding:'16px 20px',borderBottom:'1px solid #151518',display:'flex',alignItems:'center',gap:10,background:'#0D0D0F'}}>
          <${FileTypeLabel} name=${activeFile}/>
          <span style=${{fontSize:11,color:'#666',fontFamily:'monospace',flex:1}}>${activeFile.replace(/^.*[\\/]/,'')}</span>
          <${CopyBtn} label="Copy" text=${activeContent}/>

        </div>`}
        <div style=${{flex:1,padding:'20px 24px'}}>
          <pre style=${{fontFamily:"'Barlow',monospace",fontSize:13,color:'#D0D0D4',lineHeight:1.9,whiteSpace:'pre-wrap',wordBreak:'break-word',margin:0}}>${activeContent}</pre>
        </div>
      </div>
    </div>`;
  }

  // ── Fallback: stdout-only mode ──
  return html`<div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style=${{padding:'14px 20px',borderBottom:'1px solid #1A1A1E',display:'flex',gap:8,flexWrap:'wrap'}}>
      <${CopyBtn} label="Copy All" text=${output}/>
      <${DlBtn} text=${output} filename="output.txt"/>
    </div>
    <div style=${{flex:1,overflowY:'auto',padding:'20px 24px'}}>
      <pre style=${{fontFamily:"'Barlow',monospace",fontSize:12.5,color:'#CCC',lineHeight:1.8,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>${output}</pre>
    </div>
  </div>`;
}

const AI_VOICE_IDS=new Set(['repair-auto','componentcare','fleetmaint','prev-advisor','enviromaint']);

function ChatModulePanel({mod,onClose}){
  const[msgs,sMsgs]=useState([]);
  const[input,sInput]=useState('');
  const[loading,sLoad]=useState(false);
  const[listening,sListening]=useState(false);
  const bottomRef=useRef(null);
  const recognitionRef=useRef(null);

  useEffect(()=>{
    if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[msgs]);

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice input not supported in this browser. Try Chrome.');return;}
    const r=new SR();r.lang='en-US';r.continuous=false;r.interimResults=false;
    r.onstart=()=>sListening(true);
    r.onend=()=>sListening(false);
    r.onresult=(e)=>{const t=e.results[0][0].transcript;sInput(p=>p?p+' '+t:t);};
    r.onerror=()=>sListening(false);
    recognitionRef.current=r;r.start();
  };

  const send=async()=>{
    const q=input.trim();if(!q||loading)return;
    sInput('');
    const userMsg={role:'user',text:q};
    sMsgs(p=>[...p,userMsg]);
    sLoad(true);
    try{
      const url=endpointFor(mod.id,{query:q});
      const res=url?await post(url,{query:q}):{success:false,error:'No endpoint configured yet.'};
      let reply='';
      if(res.success===false)reply=res.error||'Something went wrong.';
      else{
        reply=res.output||'';
        if(!reply&&res.content&&typeof res.content==='object'){
          reply=Object.entries(res.content).map(([k,v])=>`${k}\n\n${v}`).join('\n\n'+'─'.repeat(40)+'\n\n');
        }
        if(!reply)reply=JSON.stringify(res,null,2);
      }
      sMsgs(p=>[...p,{role:'ai',text:reply,content:res.content||null}]);
    }catch(e){sMsgs(p=>[...p,{role:'ai',text:'Could not reach the server. Please try again in a moment.',content:null}]);}
    finally{sLoad(false);}
  };

  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  return html`<div style=${{position:'fixed',inset:0,zIndex:200,background:'#0B0B0D',display:'flex',flexDirection:'column',animation:'fadeIn .2s ease'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,${G},#F5C542,${G})`}}/>

    <!-- Header -->
    <div style=${{padding:'12px 24px',borderBottom:'1px solid #1A1A1E',display:'flex',alignItems:'center',gap:16,background:'#0D0D0F'}}>
      <button onClick=${onClose} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.08em'}}>← Back</button>
      <span style=${{fontSize:20}}>${mod.icon}</span>
      <div>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:18,color:'#F0F0F2',textTransform:'uppercase'}}>${mod.title}</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:14,color:'#444',textTransform:'uppercase',marginLeft:8}}>${mod.sub}</span>
      </div>
      <div style=${{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
        <span style=${{fontSize:9,padding:'3px 10px',borderRadius:2,background:`${G}15`,border:`1px solid ${G}40`,color:G,fontWeight:800,letterSpacing:'0.1em'}}>🎙 AI + VOICE</span>
      </div>
    </div>

    <!-- Chat history -->
    <div style=${{flex:1,overflowY:'auto',padding:'24px 32px',display:'flex',flexDirection:'column',gap:16}}>
      ${msgs.length===0&&html`<div style=${{textAlign:'center',marginTop:60,opacity:.4}}>
        <div style=${{fontSize:40,marginBottom:12}}>${mod.icon}</div>
        <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#AAA',textTransform:'uppercase',letterSpacing:'0.08em'}}>${mod.title}</div>
        <div style=${{fontSize:12,color:'#555',marginTop:8,lineHeight:1.6,maxWidth:400,margin:'8px auto 0'}}>Type your question or tap the mic to speak. Ask about any vehicle, complaint, or job.</div>
      </div>`}

      ${msgs.map((m,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
        <div style=${{maxWidth:'75%'}}>
          ${m.role==='user'?html`
            <div style=${{background:`linear-gradient(135deg,${G}22,${G}10)`,border:`1px solid ${G}33`,borderRadius:'12px 12px 3px 12px',padding:'12px 16px'}}>
              <p style=${{fontSize:13,color:'#E8E8EA',lineHeight:1.6,margin:0}}>${m.text}</p>
            </div>
          `:html`
            <div style=${{background:'#111113',border:'1px solid #1E1E22',borderRadius:'12px 12px 12px 3px',padding:'12px 16px'}}>
              <div style=${{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <span style=${{fontSize:14}}>${mod.icon}</span>
                <span style=${{fontSize:10,color:G,fontWeight:800,letterSpacing:'0.1em'}}>${mod.title.toUpperCase()}</span>
              </div>
              <pre style=${{fontSize:13,color:'#CCC',lineHeight:1.8,whiteSpace:'pre-wrap',wordBreak:'break-word',margin:0,fontFamily:"'Barlow',monospace"}}>${m.text}</pre>
              ${m.content&&Object.keys(m.content).length>0&&html`<div style=${{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}}>
                <${CopyBtn} label="Copy" text=${m.text}/>
                <${DlBtn} text=${Object.entries(m.content).map(([k,v])=>v).join('\n\n')} filename="response.txt"/>
              </div>`}
              ${!m.content&&m.text.length>50&&html`<div style=${{marginTop:10,display:'flex',gap:8}}>
                <${CopyBtn} label="Copy" text=${m.text}/>
                <${DlBtn} text=${m.text} filename="response.txt"/>
              </div>`}
            </div>
          `}
        </div>
      </div>`)}

      ${loading&&html`<div style=${{display:'flex',justifyContent:'flex-start'}}>
        <div style=${{background:'#111113',border:'1px solid #1E1E22',borderRadius:'12px 12px 12px 3px',padding:'14px 18px',display:'flex',gap:6,alignItems:'center'}}>
          ${[0,1,2].map(i=>html`<div key=${i} style=${{width:8,height:8,borderRadius:'50%',background:G,animation:`pulse 1.2s ease ${i*0.2}s infinite`}}/>`)}
        </div>
      </div>`}

      <div ref=${bottomRef}/>
    </div>

    <!-- Input bar -->
    <div style=${{padding:'16px 24px',borderTop:'1px solid #1A1A1E',background:'#0D0D0F',display:'flex',gap:10,alignItems:'flex-end'}}>
      <textarea
        value=${input}
        onChange=${e=>sInput(e.target.value)}
        onKeyDown=${onKey}
        placeholder="Ask about a vehicle, complaint, or job... (Enter to send)"
        rows="2"
        style=${{flex:1,padding:'12px 16px',borderRadius:8,border:`1px solid ${listening?G:'#222'}`,background:'#111',color:'#E0E0E4',fontSize:13,fontFamily:"'Barlow',sans-serif",resize:'none',lineHeight:1.5,transition:'border-color .2s'}}
      />
      <button onClick=${startVoice}
        style=${{width:46,height:46,borderRadius:8,border:`1px solid ${listening?G+'88':'#222'}`,background:listening?`${G}20`:'#111',color:listening?G:'#555',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,animation:listening?'pulse 1s infinite':'none'}}>
        🎙
      </button>
      <button onClick=${send} disabled=${loading||!input.trim()}
        style=${{height:46,padding:'0 20px',borderRadius:8,border:`1px solid ${G}66`,background:loading||!input.trim()?'#111':`linear-gradient(135deg,${G},${G}CC)`,color:loading||!input.trim()?'#444':'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.1em',textTransform:'uppercase',fontStyle:'italic',flexShrink:0}}>
        ${loading?'...':'Send →'}
      </button>
    </div>
  </div>`;
}

function ModulePanel({mod,onClose}){
  if(AI_VOICE_IDS.has(mod.id))return html`<${ChatModulePanel} mod=${mod} onClose=${onClose}/>`;

  const[output,sOut]=useState('');
  const[loading,sLoad]=useState(false);
  const[error,sErr]=useState(null);
  const[content,sContent]=useState(null);
  const Form=FORM_MAP[mod.id];

  const handleSubmit=async(data)=>{
    sLoad(true);sErr(null);sOut('');sContent(null);
    try{
      const url=endpointFor(mod.id,data);
      if(!url)throw new Error('No endpoint for '+mod.id);
      const res=await post(url,data);
      if(res.success===false&&res.error)sErr(res.error);
      else{
        sOut(res.output||'');
        sContent(res.content&&Object.keys(res.content).length>0?res.content:null);
      }
    }catch(e){sErr(e.message||'Could not reach the server. Please try again');}
    finally{sLoad(false);}
  };

  return html`<div style=${{position:'fixed',inset:0,zIndex:200,background:'#0B0B0D',display:'flex',flexDirection:'column',animation:'fadeIn .2s ease'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,${G},#F5C542,${G})`}}/>
    <div style=${{padding:'12px 24px',borderBottom:'1px solid #1A1A1E',display:'flex',alignItems:'center',gap:16,background:'#0D0D0F'}}>
      <button onClick=${onClose} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.08em'}}>← Back</button>
      <span style=${{fontSize:20}}>${mod.icon}</span>
      <div>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:18,color:'#F0F0F2',textTransform:'uppercase'}}>${mod.title}</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:14,color:'#444',textTransform:'uppercase',marginLeft:8}}>${mod.sub}</span>
      </div>

function ShopProfile({onBack}){
  const[profile,sProfile]=useState(null);
  const[activeTab,sActiveTab]=useState('profile');
  const[editing,sEditing]=useState(false);
  const[form,sForm]=useState({});
  const[saving,sSaving]=useState(false);
  const[saved,sSaved]=useState(false);
  const[error,sErr]=useState(null);

  // Inventory Hub state
  const invFileRef=useRef(null);
  const[invRows,sInvRows]=useState([]);
  const[invFile,sInvFile]=useState(null);
  const[invError,sInvError]=useState(null);
  const[invSaving,sInvSaving]=useState(false);
  const[invSaved,sInvSaved]=useState(false);
  const[invDrag,sInvDrag]=useState(false);
  const[invSearch,sInvSearch]=useState('');

  useEffect(()=>{
    // FIX: API returns {success, profile:{...}} — extract nested profile object
    fetch(`${API}/api/profile`).then(r=>r.json()).then(d=>{
      const p=d.profile||d;
      sProfile(p);
      sForm({
        shop_name:p.shop_name||'',owner_name:p.owner_name||'',phone:p.phone||'',
        address:p.address||'',location:p.location||'',business_type:p.business_type||'',
        hours:p.hours||'',services:Array.isArray(p.services)?p.services.join(', '):p.services||'',
        website:p.website||'',tagline:p.tagline||'',tone:p.tone||'Professional and friendly',
        google_review:p.review_links?.google||'',yelp_review:p.review_links?.yelp||'',
        facebook:p.social_media?.facebook||'',instagram:p.social_media?.instagram||'',
      });
    }).catch(()=>sErr('Could not load profile. Please wait a moment and refresh.'));
    // Load saved catalog
    fetch(`${API}/api/parts/catalog`).then(r=>r.json()).then(d=>{
      if(d.items&&d.items.length>0)sInvRows(d.items);
    }).catch(()=>{});
  },[]);

  const save=async()=>{
    sSaving(true);sErr(null);
    try{
      const r=await post(`${API}/api/profile/save`,form);
      if(r.success!==false){sSaved(true);sEditing(false);setTimeout(()=>sSaved(false),2500);}
      else sErr(r.error||'Save failed');
    }catch(e){sErr('Cannot reach the server. Please try again.');}
    finally{sSaving(false);}
  };

  const u=(k,v)=>sForm(p=>({...p,[k]:v}));

  // CSV parser — handles quoted fields, flexible headers
  const parseCSV=(text)=>{
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2)return[];
    const norm=h=>h.trim().toLowerCase().replace(/[\s\/\-]+/g,'_').replace(/[^a-z0-9_]/g,'');
    const headers=lines[0].split(',').map(norm);
    return lines.slice(1).filter(l=>l.trim()).map(line=>{
      const vals=[];let cur='',inQ=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"')inQ=!inQ;
        else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
        else cur+=line[i];
      }
      vals.push(cur.trim());
      const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return{
        brand:obj.brand||obj.manufacturer||obj.make||'',
        part_name:obj.part_name||obj.name||obj.description||obj.part||'',
        part_number:obj.part_number||obj.part_num||obj.sku||obj.number||obj.part_no||'',
        category:obj.category||obj.cat||obj.type||'',
        unit_cost:obj.unit_cost||obj.cost||obj.price||obj.unit_price||'',
        vendor:obj.vendor||obj.supplier||obj.source||'',
      };
    }).filter(r=>r.part_name||r.part_number);
  };

  const handleFile=(file)=>{
    if(!file)return;
    sInvFile(file.name);sInvError(null);sInvRows([]);
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const rows=parseCSV(e.target.result);
        if(rows.length===0)sInvError('No valid rows found. Check CSV headers: Brand, Part Name, Part Number, Category, Unit Cost, Vendor');
        else sInvRows(rows);
      }catch{sInvError('Could not parse file. Make sure it is a valid CSV.');}
    };
    reader.readAsText(file);
  };

  const saveInventory=async()=>{
    if(invRows.length===0)return;
    sInvSaving(true);sInvError(null);
    try{
      const r=await post(`${API}/api/parts/catalog`,{items:invRows});
      if(r.success!==false){sInvSaved(true);setTimeout(()=>sInvSaved(false),2500);}
      else sInvError(r.error||'Save failed');
    }catch{sInvError('Cannot reach the server. Please try again.');}
    finally{sInvSaving(false);}
  };

  const SECTIONS=[
    {title:'Shop Info',fields:[
      {k:'shop_name',l:'Shop Name'},{k:'owner_name',l:'Owner / Manager'},
      {k:'phone',l:'Phone'},{k:'address',l:'Full Address'},
      {k:'location',l:'City, State'},{k:'business_type',l:'Business Type'},
    ]},
    {title:'Hours & Services',fields:[
      {k:'hours',l:'Business Hours'},{k:'services',l:'Services (comma-separated)'},
      {k:'tagline',l:'Tagline / Slogan'},{k:'tone',l:'Communication Tone'},
    ]},
    {title:'Online Presence',fields:[
      {k:'website',l:'Website URL'},{k:'google_review',l:'Google Review Link'},
      {k:'yelp_review',l:'Yelp Review Link'},{k:'facebook',l:'Facebook Page'},
      {k:'instagram',l:'Instagram Handle'},
    ]},
  ];

  const ProfileField=({k,l})=>html`<div key=${k}>
    <div style=${{fontSize:9,fontWeight:700,color:'#444',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:5}}>${l}</div>
    ${editing
      ?html`<input value=${form[k]||''} onChange=${e=>u(k,e.target.value)}/>`
      :html`<div style=${{fontSize:13,color:form[k]?'#CCC':'#2A2A2A',padding:'9px 0',borderBottom:'1px solid #151518',minHeight:36,lineHeight:1.6}}>
        ${form[k]||html`<span style=${{fontStyle:'italic'}}>Not set</span>`}
      </div>`}
  </div>`;

  const filteredRows=invSearch
    ?invRows.filter(r=>[r.brand,r.part_name,r.part_number,r.category,r.vendor].join(' ').toLowerCase().includes(invSearch.toLowerCase()))
    :invRows;

  return html`<div style=${{position:'fixed',inset:0,zIndex:200,background:'#0B0B0D',display:'flex',flexDirection:'column',animation:'fadeIn .2s ease'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,${G},#F5C542,${G})`}}/>

    <!-- Header bar -->
    <div style=${{padding:'12px 24px',borderBottom:'1px solid #1A1A1E',display:'flex',alignItems:'center',gap:16,background:'#0D0D0F',flexWrap:'wrap'}}>
      <button onClick=${onBack} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.08em'}}>← Back</button>
      <span style=${{fontSize:22}}>🏪</span>
      <div>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:18,color:'#F0F0F2',textTransform:'uppercase'}}>My Shop Profile</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:14,color:'#444',textTransform:'uppercase',marginLeft:10}}>Settings & Branding</span>
      </div>
      <div style=${{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
        ${activeTab==='profile'&&html`
          ${saved&&html`<span style=${{fontSize:11,color:'#4ADE80',fontWeight:700,letterSpacing:'0.06em'}}>✓ SAVED</span>`}
          ${!editing

function SetupWizard({onComplete}){
  const[f,sF]=useState({name:'',owner:'',phone:'',address:'',hours:'',services:'',type:'Independent auto repair',website:'',tagline:'',tone:'Professional and friendly',google_review:''});
  const[loading,sLoad]=useState(false);
  const[error,sErr]=useState(null);
  const u=(k,v)=>sF(p=>({...p,[k]:v}));
  const fields=[['Shop Name *','name','Peak Auto Repair'],['Owner Name *','owner','Jason Mercer'],['Phone *','phone','(720) 555-0192'],['Full Address *','address','4821 Tennyson St, Denver, CO 80212'],['Business Hours','hours','Mon-Fri 7:30am-5:30pm, Sat 8am-1pm'],['Services (comma-separated)','services','Oil changes, brakes, tires, diagnostics'],['Business Type','type','Independent auto repair'],['Website','website','https://'],['Tagline','tagline',''],['Google Review Link','google_review','https://']];

  const submit=async(e)=>{
    e.preventDefault();sLoad(true);sErr(null);
    try{const r=await post(`${API}/api/setup`,f);if(r.success!==false)onComplete();else sErr(r.error||'Setup failed');}
    catch(e){sErr('Cannot reach the server. Please try again in a moment.');}
    finally{sLoad(false);}
  };

  return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0B0B0D',padding:24}}>
    <div style=${{width:'100%',maxWidth:540}}>
      <div style=${{height:3,background:`linear-gradient(90deg,transparent,${G},transparent)`,marginBottom:32}}/>
      <h1 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:28,color:'#F2F2F4',textTransform:'uppercase',margin:'0 0 8px'}}>Shop Command Center</h1>
      <p style=${{fontSize:12,color:'#555',marginBottom:28}}>One-time setup — takes about 2 minutes.</p>
      <form onSubmit=${submit} style=${{display:'flex',flexDirection:'column',gap:14}}>
        ${fields.map(([label,key,ph])=>html`<div key=${key}>
          <${Label}>${label}</${Label}>
          <input value=${f[key]} onChange=${e=>u(key,e.target.value)} placeholder=${ph} required=${label.includes('*')}/>
        </div>`)}
        <div>
          <${Label}>Communication Tone</${Label}>
          <select value=${f.tone} onChange=${e=>u('tone',e.target.value)}>
            <option>Professional</option><option>Friendly</option>
            <option>Professional and friendly</option><option>Casual</option>
          </select>
        </div>
        ${error&&html`<div style=${{fontSize:12,color:'#E05',padding:'10px 14px',background:'#1A0A0A',borderRadius:3,border:'1px solid #5A1A1A'}}>${error}</div>`}
        <button type="submit" style=${{marginTop:8,padding:'16px 0',borderRadius:3,border:`1px solid ${G}66`,background:loading?'#333':`linear-gradient(135deg,${G},${G}CC)`,color:loading?'#888':'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.12em',textTransform:'uppercase',fontStyle:'italic'}}>
          ${loading?'Saving...':'Complete Setup →'}
        </button>
      </form>
    </div>
  </div>`;
}

            issues:data.known_issues||[],
            learned:true,
          };
        });
        sLearned(transformed);
      }).catch(()=>{});
    // Load uploaded parts & prices
    fetch(`${API}/api/knowledge-base/parts-prices`)
      .then(r=>r.json()).then(d=>{if(d.success)sPriceRows(d.rows||[]);}).catch(()=>{});

    const file=e.target.files[0];

    sPriceUploading(true); sPriceMsg('');
    const fd=new FormData(); fd.append('file',file);
    try{
      const res=await fetch(`${API}/api/knowledge-base/parts-prices/upload`,{method:'POST',body:fd});
      const d=await res.json();
      if(d.success){
        sPriceMsg(`✅ ${d.message}`);
        const r=await fetch(`${API}/api/knowledge-base/parts-prices`);
        const rd=await r.json();
        if(rd.success) sPriceRows(rd.rows||[]);
      } else {
        sPriceMsg(`❌ ${d.error||'Upload failed'}`);
      }
    }catch(err){ sPriceMsg('❌ Could not reach server'); }
    sPriceUploading(false);
    e.target.value='';
  }

    e.preventDefault();

          <div style=${{width:46,height:46,borderRadius:4,background:'linear-gradient(135deg,#18180B,#0F0F0A)',border:`2px solid ${G}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⚙️</div>
          <div>
            <h1 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:28,color:'#F2F2F4',textTransform:'uppercase',letterSpacing:'0.03em',lineHeight:1,margin:0}}>Shop Command Center</h1>
            <p style=${{fontSize:10,color:G,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',margin:'5px 0 0'}}>AI-Powered Operations Suite</p>
          </div>
        </div>
        <p style=${{fontSize:13,color:'#555',marginTop:4}}>Sign in to access your shop's operations dashboard</p>
      </div>

      <div style=${{width:'100%',maxWidth:420,background:'#111113',border:'1px solid #1E1E22',borderRadius:8,overflow:'hidden'}}>
        <div style=${{display:'flex',borderBottom:'1px solid #1E1E22'}}>
          <button style=${tabBtn('signin')} onClick=${()=>{sTab('signin');sErr('');sMsg('');}}>Sign In</button>
          <button style=${tabBtn('signup')} onClick=${()=>{sTab('signup');sErr('');sMsg('');}}>Create Account</button>
        </div>

        <div style=${{padding:32}}>
          ${err&&html`<div style=${{background:'#1A0808',border:'1px solid #4A1A1A',borderRadius:4,padding:'10px 14px',marginBottom:16,color:'#E05555',fontSize:13}}>${err}</div>`}
          ${msg&&html`<div style=${{background:'#0A1A0A',border:'1px solid #1A4A1A',borderRadius:4,padding:'10px 14px',marginBottom:16,color:'#55BB55',fontSize:13}}>${msg}</div>`}

          ${tab==='signin'?html`
            <form onSubmit=${handleSignIn} style=${{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style=${{fontSize:11,color:'#666',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6}}>Email</label>
                <input type="email" value=${email} onInput=${e=>sEmail(e.target.value)} placeholder="you@example.com" required style=${inputStyle}/>
              </div>
              <div>
                <label style=${{fontSize:11,color:'#666',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6}}>Password</label>
                <input type="password" value=${pass} onInput=${e=>sPass(e.target.value)} placeholder="••••••••" required style=${inputStyle}/>
              </div>
              <button type="submit" disabled=${loading} style=${btnStyle}>
                ${loading?'Signing in…':'Sign In'}
              </button>
            </form>
          `:html`
            <form onSubmit=${handleSignUp} style=${{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style=${{fontSize:11,color:'#666',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6}}>Full Name</label>
                <input type="text" value=${name} onInput=${e=>sName(e.target.value)} placeholder="Jane Smith" style=${inputStyle}/>
              </div>
              <div>
                <label style=${{fontSize:11,color:'#666',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6}}>Email</label>
                <input type="email" value=${email} onInput=${e=>sEmail(e.target.value)} placeholder="you@example.com" required style=${inputStyle}/>
              </div>
              <div>
                <label style=${{fontSize:11,color:'#666',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6}}>Password (min 6 chars)</label>
                <input type="password" value=${pass} onInput=${e=>sPass(e.target.value)} placeholder="••••••••" required minLength="6" style=${inputStyle}/>
              </div>
              <button type="submit" disabled=${loading} style=${btnStyle}>
                ${loading?'Creating account…':'Create Account'}
              </button>
            </form>
          `}
        </div>
      </div>

      <p style=${{marginTop:20,fontSize:11,color:'#333',textAlign:'center'}}>
        Powered by <span style=${{color:G,fontWeight:700}}>AmericasBestShops.com</span>
      </p>
    </div>`;
}

/* ── APP ── */
function App(){
  const[cat,sCat]=useState('all');
  const[sel,sSel]=useState(null);
  const[panel,sPanel]=useState(null);
  const[ready,sReady]=useState(false);
  const[setup,sSetup]=useState(false);
  const[view,sView]=useState('modules'); // 'modules' | 'profile'
  const[session,sSession]=useState(undefined); // undefined=loading, null=no session, obj=logged in

  // Auth listener — runs once on mount
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>sSession(session??null));
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_event,session)=>sSession(session??null));
    return()=>subscription.unsubscribe();
  },[]);

  // Health check — runs every time session becomes active (covers new signups + returning users)
  useEffect(()=>{
    if(!session) return;
    setTimeout(()=>sReady(true),50);
    fetch(`${API}/api/health`).then(r=>r.json()).then(d=>{if(!d.setup_complete)sSetup(true);}).catch(()=>{});
  },[session]);

  // Still checking session
  if(session===undefined) return html`<div style=${{minHeight:'100vh',background:'#0B0B0D',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style=${{width:36,height:36,border:`3px solid ${G}`,borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
    <style>${'@keyframes spin{to{transform:rotate(360deg)}}'}</style>
  </div>`;

  // Not logged in
  if(!session) return html`<${AuthPage}/>`;

  async function handleLogout(){
    await supabase.auth.signOut();
  }

  const list=MODULES.filter(m=>cat==='all'||m.cat===cat);
  const core=list.filter(m=>m.status==='core');
  const sugg=list.filter(m=>m.status==='suggested');

  if(setup) return html`<${SetupWizard} onComplete=${()=>sSetup(false)}/>`;
  if(panel) return html`<${ModulePanel} mod=${panel} onClose=${()=>sPanel(null)}/>`;
  if(view==='profile') return html`<${ShopProfile} onBack=${()=>sView('modules')}/>`;
  if(view==='operations') return html`<${OperationsHub} onBack=${()=>sView('modules')}/>`;
  if(view==='knowledge-base') return html`<${ComponentCarePanel} onBack=${()=>sView('modules')}/>`;

  return html`<div style=${{minHeight:'100vh',background:'#0B0B0D'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,transparent,${G},transparent)`}}/>

    <header style=${{position:'relative',overflow:'hidden',padding:'36px 32px 0',background:'linear-gradient(180deg,#111113 0%,#0B0B0D 100%)'}}>
      <div style=${{position:'absolute',top:-40,right:-20,width:300,height:300,background:`linear-gradient(135deg,${G}08 0%,transparent 50%)`,transform:'rotate(15deg)',pointerEvents:'none'}}/>
      <div style=${{position:'absolute',top:0,right:80,width:2,height:120,background:`linear-gradient(180deg,${G}33,transparent)`,transform:'rotate(25deg)',transformOrigin:'top',pointerEvents:'none'}}/>

      <div style=${{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:20,position:'relative'}}>
        <div style=${{display:'flex',alignItems:'center',gap:14}}>
          <div style=${{width:50,height:50,borderRadius:4,background:'linear-gradient(135deg,#18180B,#0F0F0A)',border:`2px solid ${G}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>⚙️</div>
          <div>
            <h1 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:30,color:'#F2F2F4',textTransform:'uppercase',letterSpacing:'0.03em',lineHeight:1,margin:0}}>Shop Command Center</h1>
            <p style=${{fontSize:11,color:G,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',margin:'5px 0 0'}}>AI-Powered Operations Suite</p>
          </div>
        </div>
        <div style=${{display:'flex',gap:16,marginBottom:4,alignItems:'center'}}>
          ${[{n:'20',l:'Core'},{n:'6',l:'Suggested'},{n:'7',l:'Categories'}].map((s,i)=>html`
            <div key=${i} style=${{textAlign:'center',padding:'8px 18px',background:'#0E0E10',border:'1px solid #1C1C20',borderRadius:3}}>
              <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G,lineHeight:1}}>${s.n}</div>
              <div style=${{fontSize:9,color:'#555',fontWeight:700,letterSpacing:'0.1em',marginTop:3,textTransform:'uppercase'}}>${s.l}</div>
            </div>
          `)}
          <button onClick=${handleLogout} title="Sign out" style=${{padding:'8px 14px',background:'#161618',border:'1px solid #2A2A2E',borderRadius:4,color:'#666',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",display:'flex',alignItems:'center',gap:6,transition:'all .2s'}}
            onMouseEnter=${e=>{e.currentTarget.style.color='#E05555';e.currentTarget.style.borderColor='#4A1A1A';}}
            onMouseLeave=${e=>{e.currentTarget.style.color='#666';e.currentTarget.style.borderColor='#2A2A2E';}}>
            <span>⎋</span> Sign Out
          </button>
        </div>
      </div>

      <nav style=${{display:'flex',marginTop:28,borderBottom:'2px solid #1A1A1E',overflow:'auto',alignItems:'flex-end'}}>
        <!-- MY SHOP button -->
        <button onClick=${()=>sView('profile')} style=${{padding:'14px 22px',border:'none',borderBottom:'3px solid transparent',marginBottom:-2,background:'transparent',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",transition:'all .2s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
          <span style=${{fontSize:13}}>🏪</span> MY SHOP
        </button>
        <!-- OPS HUB button -->
        <button onClick=${()=>sView('operations')} style=${{padding:'14px 22px',border:'none',borderBottom:'3px solid transparent',marginBottom:-2,background:'transparent',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",transition:'all .2s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
          <span style=${{fontSize:13}}>⚙️</span> OPS HUB
        </button>
        <!-- KNOWLEDGE BASE button -->
        <button onClick=${()=>sView('knowledge-base')} style=${{padding:'14px 22px',border:'none',borderBottom:'3px solid transparent',marginBottom:-2,background:'transparent',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",transition:'all .2s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
          <span style=${{fontSize:13,filter:'grayscale(0.2)'}}>🧠</span> KNOWLEDGE BASE
        </button>
        <div style=${{width:1,height:28,background:'#222',marginBottom:2,flexShrink:0}}/>
        ${Object.entries(CATS).map(([k,v])=>{
          const count=k==='all'?MODULES.length:MODULES.filter(m=>m.cat===k).length;
          const active=cat===k;
          return html`<button key=${k} onClick=${()=>sCat(k)} style=${{padding:'14px 22px',border:'none',borderBottom:active?`3px solid ${G}`:'3px solid transparent',marginBottom:-2,background:'transparent',color:active?G:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",transition:'all .2s',whiteSpace:'nowrap'}}>
            ${v}<span style=${{marginLeft:6,opacity:.5,fontSize:10}}>${count}</span>
          </button>`;
        })}
      </nav>
    </header>

    <main style=${{padding:'28px 32px 48px'}}>
      ${core.length>0&&html`<${SHead} title="Core Modules"/>`}
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:12}}>
        ${core.map((m,i)=>html`<${Card} key=${m.id} mod=${m} idx=${i} ready=${ready} active=${sel?.id===m.id} onClick=${()=>sSel(sel?.id===m.id?null:m)}/>`)}
      </div>
      ${sugg.length>0&&html`
        <div style=${{marginTop:36}}><${SHead} title="Suggested Additions" badge="RECOMMENDED"/></div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:12}}>
          ${sugg.map((m,i)=>html`<${Card} key=${m.id} mod=${m} idx=${i+core.length} ready=${ready} active=${sel?.id===m.id} onClick=${()=>sSel(sel?.id===m.id?null:m)}/>`)}
        </div>
      `}
    </main>

    <footer style=${{borderTop:'1px solid #151518',padding:'18px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
      <div style=${{display:'flex',alignItems:'center',gap:8}}>
        <span style=${{fontSize:9,color:'#333',fontWeight:700,letterSpacing:'0.1em'}}>POWERED BY</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:13,color:G,textTransform:'uppercase'}}>AmericasBestShops.com</span>
      </div>
      <span style=${{fontSize:9,color:'#282828',fontWeight:600,letterSpacing:'0.08em'}}>WAT FRAMEWORK v1.0</span>
    </footer>

    ${sel&&html`<${Drawer} mod=${sel} onClose=${()=>sSel(null)} onLaunch=${()=>{sPanel(sel);sSel(null);}}/>`}
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
