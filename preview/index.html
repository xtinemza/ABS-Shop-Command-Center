<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shop Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,600;1,700;1,800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0B0B0D;font-family:'Barlow',sans-serif;color:#AAA}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
select,input,textarea{background:#111113;border:1px solid #222;border-radius:3px;color:#CCC;padding:10px 12px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;width:100%;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:#D4A017}
select option{background:#111113}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;font-family:'Barlow',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">

/* ── HELPERS ── */
const post=(url,data)=>fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(r=>r.json());

const endpointFor=(id,data)=>{
  const m={

    'wait-time':      `${API}/api/wait-time/generate`,

/* ── SMALL UI PIECES ── */
function Label({children}){
  return html`<div style=${{fontSize:10,fontWeight:700,color:'#555',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>${children}</div>`;
}
function Field({label,children}){
  return html`<div style=${{marginBottom:16}}><${Label}>${label}</${Label}>${children}</div>`;
}
function GenBtn({loading}){
  return html`<button type="submit" style=${{marginTop:20,padding:'14px 0',borderRadius:3,border:`1px solid ${G}66`,background:loading?'#333':`linear-gradient(135deg,${G},${G}CC)`,color:loading?'#888':'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.12em',textTransform:'uppercase',fontStyle:'italic',width:'100%'}}>${loading?'Generating...':'Generate →'}</button>`;
}
function TabBar({tabs,active,onChange}){
  return html`<div style=${{display:'flex',gap:8,marginBottom:20}}>
    ${tabs.map(t=>html`<button key=${t.id} type="button" onClick=${()=>onChange(t.id)} style=${{flex:1,padding:'8px 0',borderRadius:3,border:`1px solid ${active===t.id?G:'#222'}`,background:active===t.id?`${G}15`:'transparent',color:active===t.id?G:'#555',fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>${t.label}</button>`)}
  </div>`;
}

/* ── FORMS ── */
function AppointmentsForm({onSubmit,loading}){
  const[f,sF]=useState({touchpoint:'all',service_type:'Oil Change',channels:'sms,email,phone_script'});
  return html`<form onSubmit=${e=>{e.preventDefault();onSubmit(f)}} style=${{padding:'24px 28px',display:'flex',flexDirection:'column',flex:1}}>
    <${Field} label="Touchpoint"><select value=${f.touchpoint} onChange=${e=>sF({...f,touchpoint:e.target.value})}>
      <option value="all">All Touchpoints</option><option value="booking_confirmation">Booking Confirmation</option>
      <option value="day_before_reminder">Day Before Reminder</option><option value="day_of_notification">Day-Of Notification</option>
      <option value="post_service_thankyou">Post-Service Thank-You</option><option value="thirty_day_followup">30-Day Follow-Up</option>
      <option value="six_month_maintenance">6-Month Maintenance</option>
    </select></${Field}>
    <${Field} label="Service Type"><input value=${f.service_type} onChange=${e=>sF({...f,service_type:e.target.value})} placeholder="e.g. Brake Service"/></${Field}>
    <${Field} label="Channels"><select value=${f.channels} onChange=${e=>sF({...f,channels:e.target.value})}>
      <option value="sms,email,phone_script">All Channels</option><option value="sms">SMS Only</option>
      <option value="email">Email Only</option><option value="phone_script">Phone Script Only</option>
    </select></${Field}>
    <${GenBtn} loading=${loading}/>
  </form>`;
}

/* ── OUTPUT PANEL ── */
function CopyBtn({label,text,dim}){
  const[ok,sOk]=useState(false);
  const click=()=>{navigator.clipboard.writeText(text).catch(()=>{});sOk(true);setTimeout(()=>sOk(false),1500)};
  return html`<button onClick=${click} style=${{padding:'6px 14px',borderRadius:3,border:`1px solid ${dim?'#222':G+'66'}`,background:dim?'#111':`${G}15`,color:dim?'#555':G,fontSize:10,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase'}}>${ok?'✓ Copied':label}</button>`;
}
function DlBtn({text}){
  const click=()=>{const b=new Blob([text],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='output.txt';a.click();URL.revokeObjectURL(u)};
  return html`<button onClick=${click} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:10,fontWeight:800,letterSpacing:'0.1em',textTransform:'uppercase'}}>Download .txt</button>`;
}

function OutputPanel({output,loading,error,files}){
  if(loading) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
    <div style=${{display:'flex',gap:8}}>
      ${[0,1,2].map(i=>html`<div key=${i} style=${{width:10,height:10,borderRadius:'50%',background:G,animation:`pulse 1.2s ease ${i*0.2}s infinite`}}/>`)}
    </div>
    <div style=${{fontSize:12,color:'#555',fontWeight:700,letterSpacing:'0.1em'}}>GENERATING...</div>
  </div>`;

  if(error) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
    <div style=${{background:'#1A0A0A',border:'1px solid #5A1A1A',borderRadius:4,padding:'20px 24px',maxWidth:400}}>
      <div style=${{fontSize:10,fontWeight:800,color:'#E05',letterSpacing:'0.1em',marginBottom:8}}>ERROR</div>
      <div style=${{fontSize:13,color:'#AAA',lineHeight:1.6}}>${error}</div>
      <div style=${{fontSize:11,color:'#555',marginTop:12}}>Make sure the backend is running on port 8000.</div>
    </div>
  </div>`;

  if(!output) return html`<div style=${{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
    <div style=${{fontSize:32,opacity:.3}}>⚡</div>
    <div style=${{fontSize:11,color:'#333',fontWeight:700,letterSpacing:'0.1em',textAlign:'center'}}>FILL IN THE FORM${'\n'}AND CLICK GENERATE</div>
  </div>`;

  const hasSMS=output.includes('SMS')||output.includes('[SMS]');
  const hasEmail=output.includes('Subject:');
  const hasScript=output.includes('[GREET]');

  return html`<div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style=${{padding:'14px 20px',borderBottom:'1px solid #1A1A1E',display:'flex',gap:8,flexWrap:'wrap'}}>
      <${CopyBtn} label="Copy All" text=${output}/>
      <${DlBtn} text=${output}/>
      ${hasSMS&&html`<${CopyBtn} label="Copy SMS" text=${output} dim/>`}
      ${hasEmail&&html`<${CopyBtn} label="Copy Email" text=${output} dim/>`}
      ${hasScript&&html`<${CopyBtn} label="Copy Script" text=${output} dim/>`}
    </div>
    <div style=${{flex:1,overflowY:'auto',padding:'20px 24px'}}>
      <pre style=${{fontFamily:"'Barlow',monospace",fontSize:12.5,color:'#CCC',lineHeight:1.8,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>${output}</pre>
      ${files&&files.length>0&&html`<div style=${{marginTop:24,paddingTop:16,borderTop:'1px solid #1A1A1E'}}>
        <div style=${{fontSize:9,fontWeight:800,color:'#444',letterSpacing:'0.1em',marginBottom:8}}>SAVED FILES</div>
        ${files.map((f,i)=>html`<div key=${i} style=${{fontSize:11,color:'#555',padding:'4px 0',fontFamily:'monospace'}}>📄 ${f}</div>`)}
      </div>`}
    </div>
  </div>`;
}

/* ── MODULE PANEL ── */
function ModulePanel({mod,onClose}){
  const[output,sOut]=useState('');
  const[loading,sLoad]=useState(false);
  const[error,sErr]=useState(null);
  const[files,sFiles]=useState([]);
  const Form=FORM_MAP[mod.id];

  const handleSubmit=async(data)=>{
    sLoad(true);sErr(null);sOut('');sFiles([]);
    try{
      const url=endpointFor(mod.id,data);
      if(!url)throw new Error('No endpoint for '+mod.id);
      const res=await post(url,data);
      if(res.success===false&&res.error)sErr(res.error);
      else{sOut(res.output||JSON.stringify(res,null,2));sFiles(res.files||[]);}
    }catch(e){sErr(e.message||'Could not reach backend on port 8000');}
    finally{sLoad(false);}
  };

  return html`<div style=${{position:'fixed',inset:0,zIndex:200,background:'#0B0B0D',display:'flex',flexDirection:'column',animation:'fadeIn .2s ease'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,${G},#F5C542,${G})`}}/>
    <div style=${{padding:'12px 24px',borderBottom:'1px solid #1A1A1E',display:'flex',alignItems:'center',gap:16,background:'#0D0D0F'}}>
      <button onClick=${onClose} style=${{padding:'6px 14px',borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.08em'}}>← Back</button>
      <span style=${{fontSize:20}}>${mod.icon}</span>
      <div>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:18,color:'#F0F0F2',textTransform:'uppercase'}}>${mod.title}</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:14,color:'#444',textTransform:'uppercase',marginLeft:8}}>${mod.sub}</span>
      </div>
      <div style=${{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
        <div style=${{width:6,height:6,borderRadius:1,background:G}}/>
        <span style=${{fontSize:11,color:G,fontWeight:700}}>${mod.impact}</span>
      </div>
    </div>
    <div style=${{flex:1,display:'flex',overflow:'hidden'}}>
      <div style=${{width:420,borderRight:'1px solid #1A1A1E',background:'#0D0D0F',display:'flex',flexDirection:'column',overflowY:'auto'}}>
        <div style=${{padding:'18px 28px 0'}}>
          <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <div style=${{width:3,height:14,background:G,borderRadius:1}}/>
            <span style=${{fontSize:9,fontWeight:800,color:'#555',letterSpacing:'0.14em'}}>INPUT</span>
          </div>
        </div>
        ${Form?html`<${Form} onSubmit=${handleSubmit} loading=${loading}/>`:html`<div style=${{padding:24,color:'#444',fontSize:12}}>Form coming soon.</div>`}
      </div>
      <div style=${{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style=${{padding:'18px 24px 0'}}>
          <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <div style=${{width:3,height:14,background:G,borderRadius:1}}/>
            <span style=${{fontSize:9,fontWeight:800,color:'#555',letterSpacing:'0.14em'}}>OUTPUT</span>
          </div>
        </div>
        <${OutputPanel} output=${output} loading=${loading} error=${error} files=${files}/>
      </div>
    </div>
  </div>`;
}

              <h2 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:23,color:'#F0F0F2',textTransform:'uppercase',lineHeight:1.05,margin:0}}>${mod.title}</h2>
              <p style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:15,color:'#666',textTransform:'uppercase',margin:'3px 0 0'}}>${mod.sub}</p>
            </div>
          </div>
          <button onClick=${onClose} style=${{width:30,height:30,borderRadius:3,border:'1px solid #222',background:'#111',color:'#555',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      </div>
      <div style=${{padding:'24px 28px'}}>
        <div style=${{padding:'16px 18px',borderRadius:3,background:'linear-gradient(135deg,#16140D,#11100C)',border:`1px solid ${G}25`,marginBottom:24,display:'flex',alignItems:'center',gap:14}}>
          <div style=${{width:10,height:10,borderRadius:2,background:G,boxShadow:`0 0 12px ${G}55`}}/>
          <div>
            <div style=${{fontSize:8,color:'#777',fontWeight:800,letterSpacing:'0.14em',marginBottom:4}}>BUSINESS IMPACT</div>
            <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,color:G,fontWeight:800,fontStyle:'italic',textTransform:'uppercase'}}>${mod.impact}</div>
          </div>
        </div>
        <p style=${{fontSize:13.5,color:'#888',lineHeight:1.7,marginBottom:28}}>${mod.desc}</p>
        <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style=${{width:3,height:14,background:G,borderRadius:1}}/>
          <span style=${{fontSize:9,fontWeight:800,color:'#777',letterSpacing:'0.14em'}}>WHAT'S INSIDE</span>
        </div>
        <div style=${{display:'flex',flexDirection:'column',gap:5,marginBottom:28}}>
          ${fl.map((f,i)=>html`<div key=${i} style=${{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:2,background:'#111113',border:'1px solid #18181C'}}>
            <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,color:G,width:22,textAlign:'center',flexShrink:0}}>${String(i+1).padStart(2,'0')}</span>
            <span style=${{fontSize:13,color:'#999',lineHeight:1.3}}>${f}</span>
          </div>`)}
        </div>
        <div style=${{paddingTop:18,borderTop:'1px solid #18181C',display:'flex',gap:8,marginBottom:20}}>
          <span style=${{fontSize:8,fontWeight:800,color:'#555',padding:'4px 10px',borderRadius:2,background:'#111',border:'1px solid #1A1A1E',letterSpacing:'0.1em'}}>${mod.tag}</span>
          <span style=${{fontSize:8,fontWeight:800,color:mod.status==='core'?'#4ADE80':G,padding:'4px 10px',borderRadius:2,background:mod.status==='core'?'#4ADE8008':`${G}08`,border:`1px solid ${mod.status==='core'?'#4ADE8020':`${G}20`}`,letterSpacing:'0.1em'}}>
            ${mod.status==='core'?'● CORE':'◐ SUGGESTED'}
          </span>
        </div>
        <button onClick=${onLaunch} style=${{width:'100%',padding:'16px 0',borderRadius:3,border:`1px solid ${G}66`,background:`linear-gradient(135deg,${G},${G}CC)`,color:'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.12em',textTransform:'uppercase',fontStyle:'italic'}}>
          Launch Module →
        </button>
      </div>
    </div>
  </div>`;
}

/* ── CARD ── */
function Card({mod,idx,ready,active,onClick}){
  const[hov,sHov]=useState(false);
  return html`<div onClick=${onClick} onMouseEnter=${()=>sHov(true)} onMouseLeave=${()=>sHov(false)}
    style=${{background:active?'#13120E':hov?'#111113':'#0E0E10',border:active?`1px solid ${G}40`:hov?'1px solid #252528':'1px solid #18181C',borderRadius:3,cursor:'pointer',transition:'all .2s',position:'relative',overflow:'hidden',animation:ready?`cardIn .35s ease ${idx*.035}s both`:'none'}}>
    <div style=${{height:2,background:hov||active?`linear-gradient(90deg,${G}AA,${G}22,transparent)`:'transparent',transition:'all .3s'}}/>
    <div style=${{padding:'18px 20px 16px'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div style=${{width:42,height:42,borderRadius:3,background:'#0B0B0D',border:'1px solid #1A1A1E',display:'flex',alignItems:'center',justifyContent:'center',fontSize:21}}>${mod.icon}</div>
        <span style=${{fontSize:8,fontWeight:800,letterSpacing:'0.14em',color:mod.status==='suggested'?G:'#4A4A50',padding:'3px 9px',borderRadius:2,background:mod.status==='suggested'?`${G}0F`:'#ffffff05',border:`1px solid ${mod.status==='suggested'?`${G}20`:'#ffffff08'}`}}>${mod.tag}</span>
      </div>
      <h3 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:17,color:'#E6E6E8',textTransform:'uppercase',lineHeight:1.1,margin:'0 0 2px',letterSpacing:'0.015em'}}>${mod.title}</h3>
      <p style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:13.5,color:'#555',textTransform:'uppercase',lineHeight:1.2,margin:'0 0 12px'}}>${mod.sub}</p>
      <p style=${{fontSize:12.5,color:'#777',lineHeight:1.6,margin:'0 0 14px'}}>${mod.desc}</p>
      <div style=${{borderTop:'1px solid #1A1A1E',paddingTop:11,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style=${{display:'flex',alignItems:'center',gap:7}}>
          <div style=${{width:5,height:5,background:G,borderRadius:1,boxShadow:`0 0 8px ${G}44`}}/>
          <span style=${{fontSize:11,color:G,fontWeight:700}}>${mod.impact}</span>
        </div>
        <span style=${{fontSize:12,color:'#333',transform:hov?'translateX(3px)':'none',transition:'transform .2s'}}>→</span>
      </div>
    </div>
  </div>`;
}

/* ── SECTION HEAD ── */
function SHead({title,badge}){
  return html`<div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
    <div style=${{width:4,height:20,background:G,borderRadius:1}}/>
    <h2 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:17,color:'#E8E8EA',textTransform:'uppercase',letterSpacing:'0.04em',margin:0}}>${title}</h2>
    ${badge&&html`<span style=${{fontSize:8,fontWeight:800,color:G,background:`${G}12`,padding:'4px 10px',borderRadius:2,border:`1px solid ${G}25`,letterSpacing:'0.12em'}}>${badge}</span>`}
    <div style=${{flex:1,height:1,background:'linear-gradient(90deg,#222,transparent)'}}/>
  </div>`;
}

/* ── SETUP WIZARD ── */
function SetupWizard({onComplete}){
  const[f,sF]=useState({name:'',owner:'',phone:'',address:'',hours:'',services:'',type:'Independent auto repair',website:'',tagline:'',tone:'Professional and friendly',google_review:''});
  const[loading,sLoad]=useState(false);
  const[error,sErr]=useState(null);
  const u=(k,v)=>sF(p=>({...p,[k]:v}));
  const fields=[['Shop Name *','name','Peak Auto Repair'],['Owner Name *','owner','Jason Mercer'],['Phone *','phone','(720) 555-0192'],['Full Address *','address','4821 Tennyson St, Denver, CO 80212'],['Business Hours','hours','Mon-Fri 7:30am-5:30pm, Sat 8am-1pm'],['Services (comma-separated)','services','Oil changes, brakes, tires, diagnostics'],['Business Type','type','Independent auto repair'],['Website','website','https://'],['Tagline','tagline',''],['Google Review Link','google_review','https://']];

  const submit=async(e)=>{
    e.preventDefault();sLoad(true);sErr(null);
    try{const r=await post(`${API}/api/setup`,f);if(r.success!==false)onComplete();else sErr(r.error||'Setup failed');}
    catch(e){sErr('Cannot reach backend. Start it on port 8000 first.');}
    finally{sLoad(false);}
  };

  return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0B0B0D',padding:24}}>
    <div style=${{width:'100%',maxWidth:540}}>
      <div style=${{height:3,background:`linear-gradient(90deg,transparent,${G},transparent)`,marginBottom:32}}/>
      <h1 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:28,color:'#F2F2F4',textTransform:'uppercase',margin:'0 0 8px'}}>Shop Command Center</h1>
      <p style=${{fontSize:12,color:'#555',marginBottom:28}}>One-time setup — takes about 2 minutes.</p>
      <form onSubmit=${submit} style=${{display:'flex',flexDirection:'column',gap:14}}>
        ${fields.map(([label,key,ph])=>html`<div key=${key}>
          <${Label}>${label}</${Label}>
          <input value=${f[key]} onChange=${e=>u(key,e.target.value)} placeholder=${ph} required=${label.includes('*')}/>
        </div>`)}
        <div>
          <${Label}>Communication Tone</${Label}>
          <select value=${f.tone} onChange=${e=>u('tone',e.target.value)}>
            <option>Professional</option><option>Friendly</option>
            <option>Professional and friendly</option><option>Casual</option>
          </select>
        </div>
        ${error&&html`<div style=${{fontSize:12,color:'#E05',padding:'10px 14px',background:'#1A0A0A',borderRadius:3,border:'1px solid #5A1A1A'}}>${error}</div>`}
        <button type="submit" style=${{marginTop:8,padding:'16px 0',borderRadius:3,border:`1px solid ${G}66`,background:loading?'#333':`linear-gradient(135deg,${G},${G}CC)`,color:loading?'#888':'#0B0B0D',fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.12em',textTransform:'uppercase',fontStyle:'italic'}}>
          ${loading?'Saving...':'Complete Setup →'}
        </button>
      </form>
    </div>
  </div>`;
}

/* ── APP ── */
function App(){
  const[cat,sCat]=useState('all');
  const[sel,sSel]=useState(null);
  const[panel,sPanel]=useState(null);
  const[ready,sReady]=useState(false);
  const[setup,sSetup]=useState(false);

  useEffect(()=>{
    setTimeout(()=>sReady(true),50);
    fetch(`${API}/api/health`).then(r=>r.json()).then(d=>{if(!d.setup_complete)sSetup(true);}).catch(()=>{});
  },[]);

  const list=MODULES.filter(m=>cat==='all'||m.cat===cat);
  const core=list.filter(m=>m.status==='core');
  const sugg=list.filter(m=>m.status==='suggested');

  if(setup) return html`<${SetupWizard} onComplete=${()=>sSetup(false)}/>`;
  if(panel) return html`<${ModulePanel} mod=${panel} onClose=${()=>sPanel(null)}/>`;

  return html`<div style=${{minHeight:'100vh',background:'#0B0B0D'}}>
    <div style=${{height:3,background:`linear-gradient(90deg,transparent,${G},transparent)`}}/>

    <header style=${{position:'relative',overflow:'hidden',padding:'36px 32px 0',background:'linear-gradient(180deg,#111113 0%,#0B0B0D 100%)'}}>
      <div style=${{position:'absolute',top:-40,right:-20,width:300,height:300,background:`linear-gradient(135deg,${G}08 0%,transparent 50%)`,transform:'rotate(15deg)',pointerEvents:'none'}}/>
      <div style=${{position:'absolute',top:0,right:80,width:2,height:120,background:`linear-gradient(180deg,${G}33,transparent)`,transform:'rotate(25deg)',transformOrigin:'top',pointerEvents:'none'}}/>

      <div style=${{display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexWrap:'wrap',gap:20,position:'relative'}}>
        <div style=${{display:'flex',alignItems:'center',gap:14}}>
          <div style=${{width:50,height:50,borderRadius:4,background:'linear-gradient(135deg,#18180B,#0F0F0A)',border:`2px solid ${G}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>⚙️</div>
          <div>
            <h1 style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:30,color:'#F2F2F4',textTransform:'uppercase',letterSpacing:'0.03em',lineHeight:1,margin:0}}>Shop Command Center</h1>
            <p style=${{fontSize:11,color:G,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',margin:'5px 0 0'}}>AI-Powered Operations Suite</p>
          </div>
        </div>
        <div style=${{display:'flex',gap:16,marginBottom:4}}>
          ${[{n:'13',l:'Core'},{n:'4',l:'Suggested'},{n:'5',l:'Categories'}].map((s,i)=>html`
            <div key=${i} style=${{textAlign:'center',padding:'8px 18px',background:'#0E0E10',border:'1px solid #1C1C20',borderRadius:3}}>
              <div style=${{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:G,lineHeight:1}}>${s.n}</div>
              <div style=${{fontSize:9,color:'#555',fontWeight:700,letterSpacing:'0.1em',marginTop:3,textTransform:'uppercase'}}>${s.l}</div>
            </div>
          `)}
        </div>
      </div>

      <nav style=${{display:'flex',marginTop:28,borderBottom:'2px solid #1A1A1E',overflow:'auto'}}>
        ${Object.entries(CATS).map(([k,v])=>{
          const count=k==='all'?MODULES.length:MODULES.filter(m=>m.cat===k).length;
          const active=cat===k;
          return html`<button key=${k} onClick=${()=>sCat(k)} style=${{padding:'14px 22px',border:'none',borderBottom:active?`3px solid ${G}`:'3px solid transparent',marginBottom:-2,background:'transparent',color:active?G:'#555',fontSize:11,fontWeight:800,letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontFamily:"'Barlow',sans-serif",transition:'all .2s',whiteSpace:'nowrap'}}>
            ${v}<span style=${{marginLeft:6,opacity:.5,fontSize:10}}>${count}</span>
          </button>`;
        })}
      </nav>
    </header>

    <main style=${{padding:'28px 32px 48px'}}>
      ${core.length>0&&html`<${SHead} title="Core Modules"/>`}
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:12}}>
        ${core.map((m,i)=>html`<${Card} key=${m.id} mod=${m} idx=${i} ready=${ready} active=${sel?.id===m.id} onClick=${()=>sSel(sel?.id===m.id?null:m)}/>`)}
      </div>
      ${sugg.length>0&&html`
        <div style=${{marginTop:36}}><${SHead} title="Suggested Additions" badge="RECOMMENDED"/></div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(310px,1fr))',gap:12}}>
          ${sugg.map((m,i)=>html`<${Card} key=${m.id} mod=${m} idx=${i+core.length} ready=${ready} active=${sel?.id===m.id} onClick=${()=>sSel(sel?.id===m.id?null:m)}/>`)}
        </div>
      `}
    </main>

    <footer style=${{borderTop:'1px solid #151518',padding:'18px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
      <div style=${{display:'flex',alignItems:'center',gap:8}}>
        <span style=${{fontSize:9,color:'#333',fontWeight:700,letterSpacing:'0.1em'}}>POWERED BY</span>
        <span style=${{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontStyle:'italic',fontSize:13,color:G,textTransform:'uppercase'}}>AmericasBestShops.com</span>
      </div>
      <span style=${{fontSize:9,color:'#282828',fontWeight:600,letterSpacing:'0.08em'}}>WAT FRAMEWORK v1.0</span>
    </footer>

    ${sel&&html`<${Drawer} mod=${sel} onClose=${()=>sSel(null)} onLaunch=${()=>{sPanel(sel);sSel(null);}}/>`}
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
